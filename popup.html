<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<title>M3U8 下載器</title>
<style>
  :root{
    --bg:#0B0F14;
    --bg-card:#11161D;
    --bg-input:#0E1319;
    --text:#E7EDF3;
    --text-dim:#7E8A99;
    --text-faint:#4B5563;
    --accent:#2DD4BF;
    --accent-dim:rgba(45,212,191,0.14);
    --border:#212934;
    --mono:'SF Mono','JetBrains Mono',ui-monospace,Menlo,Consolas,monospace;
    --sans:-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang TC','Noto Sans TC',sans-serif;
  }
  *{ box-sizing:border-box; }
  .hidden{ display:none !important; }
  body{
    margin:0;
    width:360px;
    background:var(--bg);
    color:var(--text);
    font-family:var(--sans);
    padding:16px;
  }
  .header{
    display:flex;
    justify-content:space-between;
    align-items:flex-start;
    margin-bottom:14px;
  }
  h1{
    font-size:17px;
    margin:0;
    font-weight:650;
  }
  h1 .arrow{ color:var(--accent); padding:0 4px; font-weight:500; }

  .manage-link{
    appearance:none;
    border:1px solid var(--border);
    background:transparent;
    color:var(--text-dim);
    font-size:11px;
    padding:5px 10px;
    border-radius:7px;
    cursor:pointer;
    white-space:nowrap;
    font-family:var(--sans);
    flex-shrink:0;
    margin-top:2px;
  }
  .manage-link:hover{ border-color:var(--accent); color:var(--accent); }

  .section-label{
    font-size:11px;
    font-weight:700;
    color:var(--text-dim);
    margin:0 0 6px 2px;
    display:flex;
    justify-content:space-between;
  }

  .stream-list{
    display:flex;
    flex-direction:column;
    gap:6px;
    max-height:220px;
    overflow-y:auto;
  }
  .stream-item{
    background:var(--bg-card);
    border:1px solid var(--border);
    border-radius:9px;
    padding:8px 10px;
    display:flex;
    align-items:center;
    gap:8px;
  }
  .stream-url{
    flex:1;
    font-family:var(--mono);
    font-size:10.5px;
    color:var(--text-dim);
    overflow:hidden;
    text-overflow:ellipsis;
    white-space:nowrap;
    direction:ltr;
  }
  .stream-go{
    appearance:none;
    border:none;
    background:var(--accent);
    color:#06201C;
    font-weight:700;
    font-size:11px;
    padding:6px 10px;
    border-radius:7px;
    cursor:pointer;
    flex-shrink:0;
    white-space:nowrap;
  }
  .empty-hint{
    font-size:11.5px;
    color:var(--text-faint);
    background:var(--bg-card);
    border:1px solid var(--border);
    border-radius:9px;
    padding:12px;
    line-height:1.6;
  }

  footer{
    margin-top:14px;
    font-size:10.5px;
    color:var(--text-faint);
    line-height:1.6;
  }
</style>
</head>
<body>

  <div class="header">
    <div>
      <h1>M3U8<span class="arrow">→</span>TS</h1>
    </div>
    <button class="manage-link" id="manage-btn">任務管理</button>
  </div>

  <div class="section-label">
    <span>偵測到的串流</span>
    <span id="stream-count"></span>
  </div>
  <div id="stream-list" class="stream-list"></div>
  <div id="empty-hint" class="empty-hint hidden">
    目前還沒偵測到串流。請先在該網站播放影片幾秒鐘，讓串流開始載入。
  </div>

  <footer>
    所有下載都在本機完成，不會把影片內容傳到任何伺服器。
  </footer>

<script src="popup.js"></script>
</body>
</html>
