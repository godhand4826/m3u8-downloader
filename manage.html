<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>M3U8 下載管理</title>
<style>
  :root{
    --bg:#0B0F14;
    --bg-card:#11161D;
    --bg-elevated:#171D26;
    --bg-input:#0E1319;
    --text:#E7EDF3;
    --text-dim:#7E8A99;
    --text-faint:#4B5563;
    --accent:#2DD4BF;
    --accent-dim:rgba(45,212,191,0.14);
    --accent-bright:#5EEAD4;
    --warn:#F2B85C;
    --warn-dim:rgba(242,184,92,0.12);
    --err:#F2785C;
    --err-dim:rgba(242,120,92,0.12);
    --border:#212934;
    --mono:'SF Mono','JetBrains Mono',ui-monospace,Menlo,Consolas,monospace;
    --sans:-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang TC','Noto Sans TC',sans-serif;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--bg);
    color:var(--text);
    font-family:var(--sans);
    min-height:100vh;
    padding:40px 20px 60px;
    background-image:
      radial-gradient(circle at 10% 0%, rgba(45,212,191,0.05), transparent 40%),
      radial-gradient(circle at 90% 10%, rgba(45,212,191,0.03), transparent 35%);
  }
  .wrap{ width:100%; max-width:820px; margin:0 auto; }
  .hidden{ display:none !important; }

  /* ── Header ── */
  .page-header{
    display:flex;
    justify-content:space-between;
    align-items:flex-end;
    margin-bottom:24px;
  }
  h1{ font-size:28px; margin:0; font-weight:650; letter-spacing:-0.01em; }
  h1 .arrow{ color:var(--accent); font-weight:500; padding:0 6px; }

  /* ── Buttons ── */
  .btn{
    appearance:none; border:none; border-radius:9px;
    font-family:var(--sans); font-weight:650; font-size:13px;
    padding:10px 16px; cursor:pointer; transition:transform .08s;
  }
  .btn:active{ transform:scale(0.97); }
  .btn-primary{ background:var(--accent); color:#06201C; }
  .btn-primary:disabled{ background:var(--border); color:var(--text-faint); cursor:not-allowed; }
  .btn-ghost{ background:transparent; border:1px solid var(--border); color:var(--text-dim); }
  .btn-link{
    appearance:none; border:none; background:none;
    color:var(--text-faint); font-size:12px; cursor:pointer; padding:0;
    font-family:var(--sans);
  }
  .btn-link:hover{ color:var(--text-dim); }
  .setting-row{
    display:flex; align-items:center; gap:10px;
  }
  .setting-label{
    font-size:12px; color:var(--text-dim); white-space:nowrap;
    margin:0; font-weight:normal;
  }
.btn-row{ display:flex; gap:10px; margin-top:14px; flex-wrap:wrap; }

  /* ── Card / Add panel ── */
  .card{
    background:var(--bg-card);
    border:1px solid var(--border);
    border-radius:14px;
    padding:20px;
    margin-bottom:20px;
  }
  label{ display:block; font-size:12px; font-weight:600; color:var(--text-dim); margin:0 0 6px 2px; }
  .field{ margin-bottom:12px; }
  input[type=text]{
    width:100%;
    background:var(--bg-input);
    border:1px solid var(--border);
    color:var(--text);
    font-family:var(--mono);
    font-size:13px;
    padding:10px 12px;
    border-radius:9px;
    outline:none;
  }
  input[type=text]:focus{ border-color:var(--accent); box-shadow:0 0 0 3px var(--accent-dim); }
  select{
    width:100%;
    background:var(--bg-input);
    border:1px solid var(--border);
    color:var(--text);
    font-family:var(--mono);
    font-size:13px;
    padding:10px 12px;
    border-radius:9px;
    outline:none;
  }
  .meta-line{ font-family:var(--mono); font-size:12px; color:var(--text-dim); margin-top:10px; }

  /* ── Banners ── */
  .banner{ display:none; font-size:12.5px; line-height:1.6; padding:10px 12px; border-radius:9px; margin-bottom:12px; }
  .banner.show{ display:block; }
  .banner.warn{ background:var(--warn-dim); color:var(--warn); border:1px solid rgba(242,184,92,0.3); }
  .banner.err { background:var(--err-dim);  color:var(--err);  border:1px solid rgba(242,120,92,0.3); }
  .banner.ok  { background:var(--accent-dim); color:var(--accent); border:1px solid rgba(45,212,191,0.3); }

  /* ── Section header ── */
  .section-hdr{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:10px;
  }
  .section-title{
    font-size:11px;
    font-weight:700;
    color:var(--text-dim);
    text-transform:uppercase;
    letter-spacing:0.08em;
  }

  /* ── Empty hint ── */
  .empty-hint{
    font-size:13px;
    color:var(--text-faint);
    background:var(--bg-card);
    border:1px solid var(--border);
    border-radius:12px;
    padding:24px;
    text-align:center;
    line-height:1.7;
  }

  /* ── Task list ── */
  #task-list{ display:flex; flex-direction:column; gap:8px; }

  .task-row{
    background:var(--bg-card);
    border:1px solid var(--border);
    border-radius:11px;
    padding:12px 14px;
    display:grid;
    grid-template-columns: 8px 160px minmax(0,1fr) auto 110px 44px 58px auto auto;
    align-items:center;
    column-gap:12px;
    row-gap:4px;
  }
  .task-row.has-error{
    grid-template-rows: auto auto;
  }
  .task-err-line{
    grid-column: 2 / -1;
    font-family:var(--mono);
    font-size:11px;
    color:var(--err);
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
  }

  .t-dot{
    width:8px; height:8px; border-radius:50%;
    background:var(--text-faint);
    flex-shrink:0;
  }
  .t-dot.s-active { background:var(--accent); box-shadow:0 0 0 2px rgba(45,212,191,0.25); }
  .t-dot.s-done   { background:var(--accent); opacity:0.4; }
  .t-dot.s-fail   { background:var(--err); }
  .t-dot.s-cancel { background:var(--text-faint); }
  .t-dot.s-queued { background:var(--warn); opacity:0.7; }

  .t-name{
    font-size:13px; font-weight:600;
    overflow:hidden; text-overflow:ellipsis; white-space:nowrap;
  }
  .t-url{
    font-family:var(--mono); font-size:11px; color:var(--text-dim);
    overflow:hidden; text-overflow:ellipsis; white-space:nowrap;
  }
  .t-count{
    font-family:var(--mono); font-size:11px; color:var(--text-dim);
    white-space:nowrap;
  }
  .t-bar{
    height:5px; background:var(--bg-input);
    border-radius:99px; overflow:hidden;
    border:1px solid var(--border);
  }
  .t-fill{
    height:100%;
    background:linear-gradient(90deg, var(--accent), var(--accent-bright));
    transition:width .4s ease;
  }
  .t-pct{
    font-family:var(--mono); font-size:11px;
    color:var(--text); text-align:right; white-space:nowrap;
  }
  .t-status{
    font-size:11px; white-space:nowrap; text-align:center;
  }
  .t-status.s-active { color:var(--accent); }
  .t-status.s-done   { color:var(--text-dim); }
  .t-status.s-fail   { color:var(--err); }
  .t-status.s-cancel { color:var(--text-faint); }
  .t-status.s-queued { color:var(--warn); }

  .task-btn{
    appearance:none; border:none; border-radius:7px;
    font-size:11px; font-weight:700; padding:5px 10px;
    cursor:pointer; white-space:nowrap;
  }
  .t-cancel{ background:rgba(242,120,92,0.15); color:var(--err); }
  .t-retry { background:var(--accent-dim); color:var(--accent); }
  .t-page{
    appearance:none; border:none; background:none;
    font-size:13px; color:var(--text-faint); cursor:pointer;
    padding:2px 4px; border-radius:5px; line-height:1;
    transition:color .15s;
  }
  .t-page:hover{ color:var(--accent); }
  .t-page:empty{ visibility:hidden; }

  footer{
    margin-top:32px; font-size:12px;
    color:var(--text-faint); line-height:1.7; text-align:center;
  }

  @media (prefers-reduced-motion: reduce){
    .t-fill{ transition:none; }
  }
  @media (max-width:600px){
    .task-row{
      grid-template-columns: 8px 1fr auto auto;
      grid-template-rows: auto auto auto;
    }
    .t-url, .t-count, .t-bar, .t-pct, .t-page { display:none; }
    .t-status{ grid-column:3; }
    .task-btn{ grid-column:4; }
    .task-err-line{ grid-column:2 / -1; }
  }
</style>
</head>
<body>
<div class="wrap">

  <div class="page-header">
    <div>
      <h1>M3U8<span class="arrow">→</span>TS</h1>
    </div>
    <button id="toggle-add-btn" class="btn btn-primary">+ 新增下載</button>
  </div>

  <!-- 新增下載面板（預設收起） -->
  <div id="add-panel" class="card hidden">
    <div id="banner-add-enc" class="banner ok">偵測到 AES-128 加密，將自動解密後寫入。</div>
    <div id="banner-add-fail" class="banner err"></div>

    <div class="field">
      <label for="m3u8-url">M3U8 播放清單網址</label>
      <input type="text" id="m3u8-url" placeholder="https://example.com/video/index.m3u8">
    </div>
    <div class="field">
      <label for="referer-url">偽裝 Referer 網址（選填，遇到 403 時填來源頁面網址）</label>
      <input type="text" id="referer-url" placeholder="https://example.com/watch/xxx">
    </div>
    <div id="variant-field" class="field hidden">
      <label for="variant-select">偵測到多個畫質版本，請選擇</label>
      <select id="variant-select"></select>
    </div>
    <div id="meta-line" class="meta-line hidden"></div>
    <div class="btn-row">
      <button id="parse-btn" class="btn btn-primary">解析播放清單</button>
      <button id="add-btn" class="btn btn-primary hidden">選擇儲存位置並開始下載</button>
    </div>
  </div>

  <!-- 任務清單 -->
  <div class="section-hdr">
    <span class="section-title">下載任務</span>
    <div class="setting-row">
      <button id="clear-done-btn" class="btn-link hidden">清除已完成／失敗／已取消</button>
    </div>
  </div>
  <div id="task-list"></div>
  <div id="empty-hint" class="empty-hint">
    尚無下載任務。點上方「+ 新增下載」，或在瀏覽器中播放影片後從擴充功能圖示選擇串流。
  </div>

  <footer>
    下載任務運行中請保持此頁面開啟，關閉將中斷所有進行中的任務。<br>
    所有下載都在本機完成，不會把影片內容傳到任何伺服器。<br>
    請僅用於你擁有合法授權或本人有權保存的內容。
  </footer>

</div>
<script type="module" src="manage.js"></script>
</body>
</html>
